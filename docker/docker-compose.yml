version: '3.8'

services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://backend:8000
      - APP_URL=${APP_URL}
    depends_on:
      - backend

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://fsp_user:fsp_pass@postgres:5432/fsp_db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-enterprise_super_secret_key_1337}
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=fsp_db
      - POSTGRES_USER=fsp_user
      - POSTGRES_PASSWORD=fsp_pass
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

